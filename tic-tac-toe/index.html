<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <main>
        <div class="board">
            <div data-square-index="0" class="square">0</div>
            <div data-square-index="1" class="square">1</div>
            <div data-square-index="2" class="square">2</div>
            <div data-square-index="3" class="square">3</div>
            <div data-square-index="4" class="square">4</div>
            <div data-square-index="5" class="square">5</div>
            <div data-square-index="6" class="square">6</div>
            <div data-square-index="7" class="square">7</div>
            <div data-square-index="8" class="square">8</div>
        </div>
    </main>
    
    <script type="module" src="main.js"></script>
</body>
</html>
